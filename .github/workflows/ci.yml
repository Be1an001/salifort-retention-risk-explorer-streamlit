name: CI

on:
  push:
  pull_request:

jobs:
  app-runtime-checks:
    name: App runtime checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Streamlit app dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile app runtime files
        run: |
          python - <<'PY'
          from pathlib import Path
          import py_compile

          patterns = [
              "app/app.py",
              "app/utils/load_data.py",
              "app/pages/*.py",
              "app/services/*.py",
              "app/viewmodels/*.py",
          ]
          files = []
          for pattern in patterns:
              matches = sorted(Path(".").glob(pattern))
              if not matches:
                  raise SystemExit(f"No files matched {pattern}")
              files.extend(matches)
          for path in files:
              py_compile.compile(str(path), doraise=True)
          print(f"Compiled {len(files)} app runtime files.")
          PY

  mlops-tests:
    name: MLOps tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MLOps lab dependencies
        run: python -m pip install -r requirements-mlops.txt

      - name: Compile MLOps, API, and Airflow scaffold files
        run: |
          python - <<'PY'
          from pathlib import Path
          import py_compile

          patterns = [
              "src/salifort_mlops/*.py",
              "api/*.py",
              "orchestration/airflow/dags/salifort_mlops_pipeline.py",
          ]
          files = []
          for pattern in patterns:
              matches = sorted(Path(".").glob(pattern))
              if not matches:
                  raise SystemExit(f"No files matched {pattern}")
              files.extend(matches)
          for path in files:
              py_compile.compile(str(path), doraise=True)
          print(f"Compiled {len(files)} MLOps/API/Airflow files.")
          PY

      - name: Validate Airflow DAG static contract
        run: python scripts/validate_mlops_airflow_dag.py

      - name: Run MLOps contract tests
        run: >
          python -m pytest
          tests/test_data_contract.py
          tests/test_feature_pipeline.py
          tests/test_evaluation_metrics.py
          tests/test_training_pipeline.py
          tests/test_api_contract.py
          tests/test_prediction_service.py
          tests/test_airflow_dag_contract.py

  docker-config-check:
    name: Docker Compose config check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate default Docker Compose config
        run: docker compose config

      - name: Validate MLflow profile Docker Compose config
        run: docker compose --profile mlflow config
